<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Islamic LT - Phone Controller</title>
    <link rel="stylesheet" href="src/style.css">
</head>
<body class="body-controller">

    <div class="phone-container">
        <header class="ctrl-header">
            <h2>🕌 LT Controller</h2>
            <div class="status-badge" id="status-obs">OBS Connected</div>
        </header>

        <section class="ctrl-section live-panel">
            <h3>🔴 Live On-Air</h3>
            <div class="live-display">
                <p id="live-name-display">Belum ada pembicara</p>
                <span id="live-title-display">Silakan pilih dari list</span>
            </div>
            
            <div class="main-actions">
                <button class="btn btn-in" onclick="triggerAction('show')">🎬 IN (Tampil)</button>
                <button class="btn btn-out" onclick="triggerAction('hide')">⏹️ OUT (Sembunyi)</button>
            </div>
        </section>

        <section class="ctrl-section">
            <h3>⚙️ Settings</h3>
            <div class="settings-grid">
                <div class="form-group-inline">
                    <label>Auto-Hide (Detik)</label>
                    <input type="number" id="setting-time" value="7" min="0">
                </div>
                <div class="form-group-inline checkbox-group">
                    <input type="checkbox" id="setting-auto-hide" checked>
                    <label for="setting-auto-hide">Aktifkan Timer</label>
                </div>
            </div>
            <button class="btn btn-reload" onclick="triggerAction('reload')">🔄 Auto-Reload Viewer</button>
        </section>

        <section class="ctrl-section">
            <h3>➕ Tambah Pembicara</h3>
            <div class="form-group">
                <input type="text" id="input-name" placeholder="Nama Pembicara...">
            </div>
            <div class="form-group">
                <input type="text" id="input-title" placeholder="Sub-title / Tema Kajian...">
            </div>
            <button class="btn btn-add" onclick="addSpeaker()">Simpan ke List</button>
        </section>

        <section class="ctrl-section">
            <h3>👥 List Pembicara</h3>
            <div class="speaker-list" id="speaker-list-area">
                </div>
        </section>
    </div>

    <script src="src/controller.js"></script>
</body>
</html>
