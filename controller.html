<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Advanced L3 Controller (RGBA)</title>
    <link rel="stylesheet" href="src/style.css">
</head>
<body class="controller-body">

    <div class="container">
        <div class="panel">
            <h2>Kustomisasi Desain Lower Third (RGBA)</h2>
            
            <div class="row">
                <div class="col">
                    <label>Logo (PNG/JPG)</label>
                    <input type="file" id="logoInput" accept="image/*">
                </div>
                <div class="col">
                    <label>Background Gambar (Opsional)</label>
                    <input type="file" id="bgInput" accept="image/*">
                </div>
            </div>

            <div class="row">
                <div class="col">
                    <label>Warna BG & Opacity</label>
                    <div class="color-picker-wrapper">
                        <input type="color" id="bgColor" value="#0f0f19">
                        <input type="range" id="bgOpacity" class="opacity-slider" min="0" max="1" step="0.05" value="0.95">
                    </div>
                </div>
                <div class="col">
                    <label>Warna Garis Batas & Opacity</label>
                    <div class="color-picker-wrapper">
                        <input type="color" id="borderColor" value="#29b6f6">
                        <input type="range" id="borderOpacity" class="opacity-slider" min="0" max="1" step="0.05" value="1.0">
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col" style="background: #1e1e24; padding: 10px; border-radius: 4px;">
                    <label style="color:#4fc3f7;">Gaya Nama Utama</label>
                    <label>Warna Teks & Opacity</label>
                    <div class="color-picker-wrapper">
                        <input type="color" id="nameColor" value="#ffffff">
                        <input type="range" id="nameOpacity" class="opacity-slider" min="0" max="1" step="0.05" value="1.0">
                    </div>
                    
                    <label style="margin-top:8px;">Ukuran Teks (px)</label>
                    <input type="range" id="nameSize" min="20" max="60" value="36">
                    <div class="checkbox-group">
                        <input type="checkbox" id="nameBold" checked> <label for="nameBold">Tebal</label>
                        <input type="checkbox" id="nameItalic"> <label for="nameItalic">Miring</label>
                    </div>
                </div>

                <div class="col" style="background: #1e1e24; padding: 10px; border-radius: 4px;">
                    <label style="color:#4fc3f7;">Gaya Sub Title</label>
                    <label>Warna Teks & Opacity</label>
                    <div class="color-picker-wrapper">
                        <input type="color" id="subColor" value="#29b6f6">
                        <input type="range" id="subOpacity" class="opacity-slider" min="0" max="1" step="0.05" value="1.0">
                    </div>
                    
                    <label style="margin-top:8px;">Ukuran Teks (px)</label>
                    <input type="range" id="subSize" min="14" max="35" value="20">
                    <div class="checkbox-group">
                        <input type="checkbox" id="subBold"> <label for="subBold">Tebal</label>
                        <input type="checkbox" id="subItalic"> <label for="subItalic">Miring</label>
                    </div>
                </div>
            </div>
            
            <button class="btn-danger" style="width: 100%; padding: 12px; margin-top: 15px;" onclick="clearLowerThird()">SEMBUNYIKAN / OFF (CLEAR OBS)</button>
        </div>

        <div class="panel">
            <h3>+ Tambah Narasumber Baru</h3>
            <div class="row">
                <div class="col">
                    <input type="text" id="speakerName" placeholder="Nama Narasumber">
                </div>
                <div class="col">
                    <input type="text" id="speakerSub" placeholder="Jabatan / Sub Title">
                </div>
                <button class="btn-success" onclick="addSpeaker()">+ Simpan</button>
            </div>
        </div>

        <div class="panel">
            <h3>Daftar Narasumber</h3>
            <table>
                <thead>
                    <tr>
                        <th>Nama</th>
                        <th>Sub Title</th>
                        <th style="width: 160px;">Aksi</th>
                    </tr>
                </thead>
                <tbody id="speaker-table-body"></tbody>
            </table>
        </div>
    </div>

    <script src="src/controller.js"></script>
</body>
</html>
