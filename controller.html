<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lower Third Controller</title>
    <link rel="stylesheet" href="src/controller.css">
</head>
<body>

    <div class="header">
        <span class="icon">🕌</span>
        <h1>LOWER THIRD CONTROLLER</h1>
    </div>

    <div class="card">
        <div class="section-title">
            <span class="status-dot"></span> LIVE ON-AIR
        </div>
        <div class="display-box text-preview">
            <div id="live-title">HABIB SYECH BIN ABDUL QODIR AS SEGAF</div>
            <div id="live-desc">MAJELIS AHBAABUL MUSTHOFA</div>
        </div>
        <div class="btn-group">
            <button id="btn-show-live" class="btn btn-green">SHOW</button>
            <button id="btn-hide-live" class="btn btn-red">HIDE</button>
        </div>
    </div>

    <div class="card">
        <div class="section-title">⚙️ SETTINGS</div>
            <div class="input-group">
                <label>IN-OUT (s)</label>
                <input type="number" id="setting-inout" value="1" min="0" step="0.1">
            </div>
            <div class="input-group">
                <label>ACTIVE (s)</label>
                <input type="number" id="setting-active" value="5" min="0">
            </div>
            <div class="input-group">
                <label>INTERVAL (s)</label>
                <input type="number" id="setting-interval" value="0" min="0">
            </div>
        <div class="btn-group">
            <button id="btn-save-settings" class="btn btn-green">SAVE</button>
            <button id="btn-reset-settings" class="btn btn-red">RESET</button>
        </div>
    </div>

    <div class="card">
        <div class="section-title">➕ ADD TITLE AND DESCRIPTION</div>
        <div class="input-group">
            <input type="text" id="input-title" placeholder="TITLE">
        </div>
        <div class="input-group">
            <input type="text" id="input-desc" placeholder="DESCRIPTION">
        </div>
        <button id="btn-add-list" class="btn btn-green btn-full">ADD</button>
    </div>

    <div class="card">
        <div class="section-title">📜 LISTS</div>
        <div id="lists-container">
            </div>
    </div>

    <div class="card">
        <div class="section-title">🕌 JADWAL SHOLAT RUNNING TEXT</div>
        <div class="api-group">
            <input type="text" id="input-kota" placeholder="Masukkan Nama Kota (Contoh: jakarta, surabaya)..." value="Tanah Laut">
            <button id="btn-fetch-sholat" class="btn btn-blue">🔄 GET DATA</button>
        </div>
        <div class="input-group" style="margin-top: 10px;">
            <label style="text-align: left; margin-bottom: 5px;">Preview / Custom Running Text:</label>
            <textarea id="running-text-preview" rows="2" placeholder="Data running text akan muncul di sini..."></textarea>
        </div>
    </div>

    <script src="src/controller.js"></script>
</body>
</html>
