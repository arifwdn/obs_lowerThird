<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lower Third Viewer</title>
    <link rel="stylesheet" href="src/viewer.css">
</head>
<body>

    <div id="lower-third" class="lower-third-container hide">
        <div class="logo-container">
            <img src="src/logo.png" alt="Logo" class="ornament-logo" onerror="this.style.display='none'">
        </div>
        
        <div class="text-container">
            <div class="bar-title">
                <span id="view-title">TITLE</span>
            </div>
            <div class="bar-desc">
                <span id="view-desc">DESCRIPTION</span>
            </div>
        </div>
    </div>

    <script src="src/viewer.js"></script>
</body>
</html>
